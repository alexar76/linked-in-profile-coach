name: Web Demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web demo
        run: flutter build web --release --base-href "/linked-in-profile-coach/"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - uses: actions/upload-artifact@v4
        with:
          name: web-demo
          path: build/web
          if-no-files-found: error

      - uses: actions/deploy-pages@v4
        id: deployment

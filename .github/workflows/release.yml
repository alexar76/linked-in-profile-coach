name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_BUNDLE_NAME: linkedin_profile_coach
  ARTIFACT_PREFIX: ProfileCoach

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Package macOS (.zip)
        run: |
          VERSION="${{ github.ref_name }}"
          APP="build/macos/Build/Products/Release/${{ env.APP_BUNDLE_NAME }}.app"
          OUT="build/${{ env.ARTIFACT_PREFIX }}-${VERSION}-macos.zip"
          ditto -c -k --keepParent "$APP" "$OUT"
          ls -lh "$OUT"

      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: build/${{ env.ARTIFACT_PREFIX }}-*-macos.zip
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows (.zip)
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $src = "build\windows\x64\runner\Release"
          $out = "build\${{ env.ARTIFACT_PREFIX }}-${version}-windows-x64.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $out -Force
          Get-Item $out

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/${{ env.ARTIFACT_PREFIX }}-*-windows-x64.zip
          if-no-files-found: error

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Rename APK
        run: |
          VERSION="${{ github.ref_name }}"
          SRC="build/app/outputs/flutter-apk/app-release.apk"
          OUT="build/${{ env.ARTIFACT_PREFIX }}-${VERSION}-android-universal.apk"
          cp "$SRC" "$OUT"
          ls -lh "$OUT"

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: build/${{ env.ARTIFACT_PREFIX }}-*-android-universal.apk
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux (.zip)
        run: |
          VERSION="${{ github.ref_name }}"
          OUT="${{ github.workspace }}/build/${{ env.ARTIFACT_PREFIX }}-${VERSION}-linux-x64.zip"
          (cd build/linux/x64/release/bundle && zip -r "$OUT" .)
          ls -lh "$OUT"

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: build/${{ env.ARTIFACT_PREFIX }}-*-linux-x64.zip
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows, build-android, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release files
        run: find dist -type f | sort

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*.zip
            dist/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
